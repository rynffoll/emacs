<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Package Report</title>
    <style>
      __THEME__

      * { box-sizing: border-box; }
      body {
          margin: 0; background: var(--bg); color: var(--ink);
          font-family: var(--sans); line-height: 1.5;
          -webkit-font-smoothing: antialiased;
      }
      .wrap { padding: 32px 24px 64px; }

      header h1 {
          font-size: 26px; font-weight: 650; margin: 0 0 4px;
          letter-spacing: -0.01em; text-wrap: balance;
      }
      footer { margin-top: 20px; font-size: 12px; color: var(--ink-faint); padding: 0 12px;
               display: flex; justify-content: space-between; align-items: center; gap: 14px; }

      .cnt { margin-left: 5px; font-variant-numeric: tabular-nums; opacity: 0.7; font-weight: 400; }

      .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 24px 0 14px; }
      .search {
          flex: 1 1 240px; min-width: 200px; background: var(--panel);
          border: 1px solid var(--line-strong); border-radius: 8px;
          padding: 9px 12px; color: var(--ink); font-family: var(--sans); font-size: 14px;
      }
      .search:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
      .chips { display: inline-flex; gap: 6px; }
      .chip {
          font: 600 12px var(--sans); color: var(--ink-soft); background: var(--panel);
          border: 1px solid var(--line-strong); border-radius: 999px; padding: 5px 12px;
          cursor: pointer; opacity: 0.45;
      }
      .chip.on { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); opacity: 1; }
      .chip.outdated { color: var(--warn); border-color: var(--warn); }
      .chip.outdated.on { background: var(--warn-soft); }
      .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--ink-soft); }
      .legend span { display: inline-flex; align-items: center; gap: 6px; }
      .swatch { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
      .sw-pick { background: var(--pick-soft); }

      .tablewrap {
          overflow-x: auto; border: 1px solid var(--line);
          border-radius: 12px; background: var(--panel);
      }
      table { border-collapse: collapse; width: 100%; font-size: 13px; }
      thead th { position: sticky; top: 0; z-index: 3; background: var(--panel); border-bottom: 1px solid var(--line-strong); vertical-align: bottom; }
      .sortable { font-size: 11px; font-weight: 600; color: var(--ink-soft); text-align: left; white-space: nowrap; cursor: pointer; }
      .sortable:hover { color: var(--ink); }
      .sortable .arrow { color: var(--accent); font-size: 10px; }
      th.col { padding: 6px 12px 10px; border-left: 1px solid var(--line); }

      th.pkg, td.pkg {
          position: sticky; left: 0; z-index: 2; background: var(--panel);
          border-right: 1px solid var(--line-strong); font-weight: 550;
          padding: 8px 14px 8px 16px; white-space: nowrap; max-width: 220px;
          overflow: hidden; text-overflow: ellipsis;
      }
      thead th.pkg { z-index: 4; padding: 6px 14px 10px 16px; }

      th.ver-h { padding: 6px 14px 10px; border-right: 1px solid var(--line-strong); }
      td.inst {
          font-family: var(--mono); font-size: 11.5px; white-space: nowrap;
          padding: 8px 14px; border-right: 1px solid var(--line-strong);
          font-variant-numeric: tabular-nums;
      }
      td.inst.new { color: var(--warn); font-weight: 650; }
      td.inst.cur { color: var(--ink-soft); }
      .pkglink { color: inherit; text-decoration: none; }
      .pkglink:hover { color: var(--accent); text-decoration: underline; }
      tbody td { border-bottom: 1px solid var(--line); }
      tbody tr:hover td { background: var(--accent-soft); }

      td.v {
          font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
          padding: 8px 12px; white-space: nowrap; font-variant-numeric: tabular-nums;
          border-left: 1px solid var(--line);
      }
      td.empty { color: var(--ink-faint); }
      td.pick { background: var(--pick-soft); }

      .badge {
          font-family: var(--sans); font-size: 9px; font-weight: 700;
          text-transform: uppercase; letter-spacing: 0.04em; padding: 1px 5px;
          border-radius: 4px; margin-left: 6px; vertical-align: middle;
      }
      .badge.vc { background: var(--accent-soft); color: var(--accent); }
      .empty-note { color: var(--ink-faint); padding: 24px; text-align: center; font-size: 13px; }
      @media (prefers-reduced-motion: no-preference) { td, tr { transition: background .08s ease; } }
    </style>
  </head>
  <body>

    <div class="wrap">
      <header>
        <h1>Package Report</h1>
      </header>

      <div class="controls">
        <input class="search" id="q" type="text" placeholder="Filter packages…" aria-label="Filter packages" />
        <div class="chips" id="chips" title="Click: only this kind. Shift/Cmd-click: add or remove a kind. all: show every kind.">
          <button class="chip on" id="chipAll">all<span class="cnt"></span></button>
          <button class="chip on" data-kind="archive">archive<span class="cnt"></span></button>
          <button class="chip on" data-kind="vc">vc<span class="cnt"></span></button>
          <button class="chip on" data-kind="local">local<span class="cnt"></span></button>
        </div>
        <button class="chip outdated" id="chipOutdated" title="Show only packages with a newer version available">outdated<span class="cnt"></span></button>
      </div>

      <div class="tablewrap">
        <table id="tbl">
          <thead>
            <tr id="head">
              <th class="pkg sortable" data-sort="name">package<span class="arrow"></span></th>
              <th class="ver-h sortable" data-sort="installed" title="Installed version">version<span class="arrow"></span></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="empty-note" id="noResults" hidden>No packages match.</div>

      <footer>
        <div class="legend">
          <span><span class="swatch sw-pick"></span>install target</span>
          <span><span>📍</span>pinned</span>
        </div>
        <span>Generated __DATE__</span>
      </footer>
    </div>

    <script>
      const DATA = __DATA__;

      const COLS = DATA.cols;

      // element refs (fixed after load)
      const $q = document.getElementById("q");
      const chipOutdated = document.getElementById("chipOutdated");
      const $rows = document.getElementById("rows");
      const $noResults = document.getElementById("noResults");
      const $head = document.getElementById("head");

      // Reduce an archive version to its release base (strip the .0.YYYYMMDD… suffix)
      // so same-release snapshots sort together.
      function baseOf(v) {
          const m = v.match(/^(.*?)\.0\.\d{8}/);   // BASE.0.YYYYMMDD… -> BASE
          return m ? m[1] : v;
      }

      // rows come JSON-ready from elisp: name, kind, installed, pick, url,
      // pin, outdated (boolean), ver ({archive: version}).
      const rows = DATA.packages;

      // counts live on the filter controls (all/kind chips + outdated toggle)
      const kindChips = [...document.querySelectorAll(".chip[data-kind]")];
      const chipAll = document.getElementById("chipAll");
      const syncAll = () => chipAll.classList.toggle("on",
          kindChips.every(c => c.classList.contains("on")));
      const byKind = {};
      rows.forEach(r => { byKind[r.kind] = (byKind[r.kind] || 0) + 1; });
      const nUpd = rows.filter(r => r.outdated).length;
      chipAll.querySelector(".cnt").textContent = rows.length;
      kindChips.forEach(b => b.querySelector(".cnt").textContent = byKind[b.dataset.kind] || 0);
      chipOutdated.querySelector(".cnt").textContent = nUpd;

      // append the per-archive column headers after package/version
      $head.insertAdjacentHTML("beforeend", COLS.map(c =>
          `<th class="sortable col" data-sort="col:${c}">${c}<span class="arrow"></span></th>`
      ).join(""));

      let sortKey = null, sortDir = 1;

      // comparator for a th's data-sort key; archive columns ("col:NAME")
      // keep empty cells last in both directions
      function comparator(key) {
          if (key === "name") return (a, b) => sortDir * a.name.localeCompare(b.name);
          if (key === "installed") return (a, b) => sortDir * a.installed.localeCompare(b.installed, undefined, {numeric: true});
          const col = key.slice(4);
          return (a, b) => {
              const av = a.ver[col], bv = b.ver[col];
              if (!av || !bv) return (av ? 0 : 1) - (bv ? 0 : 1);
              return sortDir * baseOf(av).localeCompare(baseOf(bv), undefined, {numeric: true});
          };
      }

      function render() {
          const q = $q.value.trim().toLowerCase();
          const outdatedOnly = chipOutdated.classList.contains("on");
          const kinds = new Set(kindChips.filter(c => c.classList.contains("on")).map(c => c.dataset.kind));
          const filtered = rows.filter(r =>
              kinds.has(r.kind) &&
                  (!q || r.name.toLowerCase().includes(q)) && (!outdatedOnly || r.outdated)
          );
          if (sortKey) filtered.sort(comparator(sortKey));
          $rows.innerHTML = filtered.map(r => {
              const cells = COLS.map(col => {
                  const v = r.ver[col];
                  if (!v) return `<td class="v empty">·</td>`;
                  const cls = col === r.pick ? "v pick" : "v";
                  const pin = (col === r.pick && r.pin)
                        ? `<span title="pinned to ${r.pin} — other archives are hidden from package.el">\u{1F4CD} </span>` : "";
                  return `<td class="${cls}" title="${col}: ${v}">${pin}${v}</td>`;
              }).join("");
              const badge = r.kind !== "archive" ? `<span class="badge vc">${r.kind}</span>` : "";
              const nameHtml = r.url
                    ? `<a class="pkglink" href="${r.url}" target="_blank" rel="noopener">${r.name}</a>`
                    : r.name;
              const instCell = `<td class="inst ${r.outdated ? "new" : "cur"}" title="${r.outdated ? "a newer archive version is available" : ""}">${r.installed || "·"}</td>`;
              return `<tr><td class="pkg" title="${r.name}">${nameHtml}${badge}</td>${instCell}${cells}</tr>`;
          }).join("");
          $noResults.hidden = filtered.length > 0;
          $head.querySelectorAll("th.sortable").forEach(th =>
              th.querySelector(".arrow").textContent =
                  th.dataset.sort === sortKey ? (sortDir > 0 ? " ↑" : " ↓") : "");
      }

      function setSort(key) {
          if (sortKey === key) sortDir *= -1;
          else { sortKey = key; sortDir = key === "name" ? 1 : -1; }
          render();
      }

      $q.addEventListener("input", render);
      chipAll.addEventListener("click", () => {
          kindChips.forEach(c => c.classList.add("on"));   // show every kind
          syncAll();
          render();
      });
      kindChips.forEach(b =>
          b.addEventListener("click", (e) => {
              if (e.shiftKey || e.metaKey || e.ctrlKey) {
                  b.classList.toggle("on");                     // modifier: add/remove this kind
                  if (!kindChips.some(c => c.classList.contains("on")))
                      kindChips.forEach(c => c.classList.add("on")); // nothing left → reset to all
              } else {
                  const solo = b.classList.contains("on") && kindChips.filter(c => c.classList.contains("on")).length === 1;
                  kindChips.forEach(c => c.classList.toggle("on", solo || c === b));
              }
              syncAll();
              render();
          }));
      chipOutdated.addEventListener("click", () => { chipOutdated.classList.toggle("on"); render(); });
      $head.querySelectorAll("th.sortable").forEach(th =>
          th.addEventListener("click", () => setSort(th.dataset.sort)));
      render();
    </script>
  </body>
</html>
